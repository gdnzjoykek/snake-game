<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk Snake</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        :root {
            --neon-green: #0f0;
            --neon-pink: #f0f;
            --neon-blue: #0ff;
            --dark-bg: #050505;
            --grid-color: rgba(0, 255, 255, 0.05);
            --glass-bg: rgba(10, 10, 10, 0.6);
            --glass-border: rgba(0, 255, 255, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--dark-bg);
            color: #fff;
            font-family: 'Orbitron', monospace;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            /* Ince Grid (Izgara) Yapisi */
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 30px 30px;
            user-select: none;
        }

        /* CRT Tarama Cizgisi (Scanline) Efekti */
        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(
                to bottom,
                rgba(18, 16, 16, 0) 50%,
                rgba(0, 0, 0, 0.25) 50%
            );
            background-size: 100% 4px;
            z-index: 50;
            pointer-events: none;
        }

        /* Ekran Koselerindeki Karartma (Vignette) */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle, transparent 60%, rgba(0,0,0,0.8) 100%);
            z-index: 49;
            pointer-events: none;
        }

        .ui-container {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 100;
        }

        /* Glassmorphism Skor Tabelasi */
        .scoreboard {
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 15px 40px;
            display: flex;
            gap: 50px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.1), inset 0 0 10px rgba(0, 255, 255, 0.05);
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }

        .score-box {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .score-label {
            font-size: 0.75rem;
            color: #888;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .score-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--neon-blue);
            text-shadow: 0 0 5px var(--neon-blue), 0 0 15px var(--neon-blue);
            transition: transform 0.1s ease;
        }

        .high-score-value {
            color: var(--neon-pink);
            text-shadow: 0 0 5px var(--neon-pink), 0 0 15px var(--neon-pink);
        }

        #game-wrapper {
            position: relative;
            z-index: 10;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.05), 0 0 40px rgba(0, 255, 255, 0.05);
            border: 2px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.9);
            border-radius: 4px;
        }

        canvas {
            display: block;
        }

        /* Kamera Titremesi (Camera Shake) */
        @keyframes shake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        .shake {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        /* Renk Bozulmasi (Glitch) Efekti */
        @keyframes glitch-anim {
            0% { filter: hue-rotate(0deg) contrast(1); }
            20% { filter: hue-rotate(90deg) contrast(1.5) invert(0.1); transform: translate(-3px, 3px); }
            40% { filter: hue-rotate(-90deg) contrast(0.8) invert(0); transform: translate(3px, -3px); }
            60% { filter: hue-rotate(180deg) contrast(2) invert(0.2); transform: translate(-3px, -3px); }
            80% { filter: hue-rotate(-45deg) contrast(1.2) invert(0); transform: translate(3px, 3px); }
            100% { filter: hue-rotate(0deg) contrast(1); transform: translate(0); }
        }

        .glitch-effect {
            animation: glitch-anim 0.4s cubic-bezier(.25,.46,.45,.94) both;
        }

        /* Oyun Bitti Ekrani */
        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        #game-over-screen.active {
            opacity: 1;
            pointer-events: all;
        }

        /* Glitchy Text */
        .glitch-text {
            font-size: 3.5rem;
            font-weight: 900;
            color: #fff;
            position: relative;
            text-transform: uppercase;
            text-shadow: 0.05em 0 0 rgba(255,0,0,.75), -0.025em -0.05em 0 rgba(0,255,0,.75), 0.025em 0.05em 0 rgba(0,0,255,.75);
            animation: glitch 1s infinite alternate-reverse;
            margin-bottom: 50px;
            letter-spacing: 5px;
        }

        @keyframes glitch {
            0% { text-shadow: 0.05em 0 0 rgba(255,0,0,.75), -0.05em -0.025em 0 rgba(0,255,0,.75), -0.025em 0.05em 0 rgba(0,0,255,.75); transform: skewX(0); }
            14% { text-shadow: 0.05em 0 0 rgba(255,0,0,.75), -0.05em -0.025em 0 rgba(0,255,0,.75), -0.025em 0.05em 0 rgba(0,0,255,.75); transform: skewX(0); }
            15% { text-shadow: -0.05em -0.025em 0 rgba(255,0,0,.75), 0.025em 0.025em 0 rgba(0,255,0,.75), -0.05em -0.05em 0 rgba(0,0,255,.75); transform: skewX(-5deg); }
            49% { text-shadow: -0.05em -0.025em 0 rgba(255,0,0,.75), 0.025em 0.025em 0 rgba(0,255,0,.75), -0.05em -0.05em 0 rgba(0,0,255,.75); transform: skewX(-5deg); }
            50% { text-shadow: 0.025em 0.05em 0 rgba(255,0,0,.75), 0.05em 0 0 rgba(0,255,0,.75), 0 -0.05em 0 rgba(0,0,255,.75); transform: skewX(2deg); }
            99% { text-shadow: 0.025em 0.05em 0 rgba(255,0,0,.75), 0.05em 0 0 rgba(0,255,0,.75), 0 -0.05em 0 rgba(0,0,255,.75); transform: skewX(2deg); }
            100% { text-shadow: -0.025em 0 0 rgba(255,0,0,.75), -0.025em -0.025em 0 rgba(0,255,0,.75), -0.025em -0.05em 0 rgba(0,0,255,.75); transform: skewX(0); }
        }

        .cyber-btn {
            background: transparent;
            color: var(--neon-blue);
            font-family: 'Orbitron', monospace;
            font-size: 1.2rem;
            font-weight: 700;
            padding: 15px 30px;
            border: 2px solid var(--neon-blue);
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2), inset 0 0 10px rgba(0, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            text-shadow: 0 0 5px var(--neon-blue);
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }

        .cyber-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.4), transparent);
            transition: left 0.5s ease;
        }

        .cyber-btn:hover {
            background: rgba(0, 255, 255, 0.1);
            box-shadow: 0 0 20px var(--neon-blue), inset 0 0 15px var(--neon-blue);
            color: #fff;
            text-shadow: 0 0 10px #fff, 0 0 20px var(--neon-blue);
        }

        .cyber-btn:hover::before {
            left: 100%;
        }

        /* Skor Artis Efekti */
        .score-bump {
            transform: scale(1.3);
            color: #fff;
        }

    </style>
</head>
<body>

    <div class="ui-container">
        <div class="scoreboard">
            <div class="score-box">
                <span class="score-label">Mevcut Skor</span>
                <span class="score-value" id="current-score">0</span>
            </div>
            <div class="score-box">
                <span class="score-label">En Yüksek</span>
                <span class="score-value high-score-value" id="high-score">0</span>
            </div>
        </div>
    </div>

    <div id="game-wrapper">
        <canvas id="gameCanvas" width="600" height="600"></canvas>
        <div id="game-over-screen">
            <div class="glitch-text" data-text="GAME OVER">GAME OVER</div>
            <button class="cyber-btn" id="restart-btn">Yeniden Başla</button>
        </div>
    </div>

    <script>
        // --- DOM Elementleri ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('current-score');
        const highScoreEl = document.getElementById('high-score');
        const gameOverScreen = document.getElementById('game-over-screen');
        const restartBtn = document.getElementById('restart-btn');
        const gameWrapper = document.getElementById('game-wrapper');

        // --- Oyun Sabitleri ---
        const GRID_SIZE = 25; // Hucre boyutu
        const TILE_COUNT = canvas.width / GRID_SIZE; // 600 / 25 = 24 hucre
        
        // --- Hiz ve Zorluk Ayarlari ---
        const INITIAL_SPEED = 140; // Baslangicta iki kare arasindaki gecikme (ms)
        const MIN_SPEED = 50; // Maksimum hiz (minimum gecikme ms)
        const SPEED_DECREMENT = 2; // Her yemde hiz inisi

        // --- Oyun Durum Degiskenleri ---
        let snake = [];
        let velocity = { x: 0, y: 0 };
        let nextVelocity = { x: 0, y: 0 }; // Ayni kare icinde hizli 2 tusa basilmasini engellemek icin
        let food = { x: 0, y: 0 };
        let score = 0;
        let highScore = localStorage.getItem('cp_snake_highscore') || 0;
        let gameActive = false;
        
        // requestAnimationFrame Icin Zamanlayici
        let lastRenderTime = 0;
        let moveInterval = INITIAL_SPEED;

        // Animasyonlar saniye ici degerleri
        let lastTimeForPulse = 0;
        let foodGlowPhase = 0;

        // --- Baslangic ---
        highScoreEl.textContent = highScore;
        initGame();

        function initGame() {
            // Yilani baslangic konumuna getir (Ortalarda 3 parca)
            snake = [
                { x: 10, y: 12 },
                { x: 9, y: 12 },
                { x: 8, y: 12 }
            ];
            
            // Saga dogru gidis
            velocity = { x: 1, y: 0 };
            nextVelocity = { x: 1, y: 0 };
            
            score = 0;
            moveInterval = INITIAL_SPEED;
            scoreEl.textContent = score;
            
            placeFood();
            
            gameActive = true;
            gameOverScreen.classList.remove('active');
            gameWrapper.classList.remove('shake');
            gameWrapper.classList.remove('glitch-effect');
            
            // Animasyon Dongusunu Baslat
            requestAnimationFrame(gameLoop);
        }

        // --- Ana Animasyon Dongusu ---
        function gameLoop(currentTime) {
            if (!gameActive) return;

            window.requestAnimationFrame(gameLoop);

            // Gecen sure
            const secSinceLastRender = currentTime - lastRenderTime;
            const delta = currentTime - lastTimeForPulse;
            lastTimeForPulse = currentTime;
            
            // Yem parlama evresini artir
            foodGlowPhase += delta * 0.005;

            if (secSinceLastRender < moveInterval) {
                // Sadece cizim guncellenir, mantik hala bekler. (Animasyonlarin akici calismasi icin)
                draw();
                return;
            }

            lastRenderTime = currentTime;
            
            update();
            draw();
        }

        // --- Oyun Mantigini Guncelle ---
        function update() {
            // Yonu Guncelle (kuyruga donme engelli)
            velocity = nextVelocity;

            // Yeni Bas Pozisyonunu Hesapla
            const prevHead = snake[0];
            const newHead = {
                x: prevHead.x + velocity.x,
                y: prevHead.y + velocity.y
            };

            // Carpima Kontrolleri (Duvarlar ve Kuyruk)
            if (isCollision(newHead)) {
                triggerGameOver();
                return;
            }

            // Yeni basi yilana ekle
            snake.unshift(newHead);

            // Yem Yenilme Kontrolu
            if (newHead.x === food.x && newHead.y === food.y) {
                score++;
                updateScoreUI();
                
                // Zorluk Egrisi: Hizlan
                if (moveInterval > MIN_SPEED) {
                    // Cok aniden hizlanmamasi ve yari yariya dusmemesi icin logaritmaya yakin dogrusal dusus
                    moveInterval -= SPEED_DECREMENT;
                }

                placeFood();
            } else {
                // Yem yenmediyse kuyruktan cikararak hareketi tamamla
                snake.pop(); 
            }
        }

        // --- Carpima Kontrol (Collision) ---
        function isCollision(pos) {
            // Duvar kontrolu
            if (pos.x < 0 || pos.x >= TILE_COUNT || pos.y < 0 || pos.y >= TILE_COUNT) {
                return true;
            }
            
            // Kendi Govdesi kontrolu
            for (let i = 0; i < snake.length; i++) {
                if (pos.x === snake[i].x && pos.y === snake[i].y) {
                    return true;
                }
            }
            return false;
        }

        // --- Cizim Islemleri ---
        function draw() {
            // Ekran Temizleme
            ctx.fillStyle = 'rgba(10, 10, 10, 1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Arkaplan Grid cizgileri
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.04)';
            ctx.lineWidth = 1;
            for (let i = 0; i < canvas.width; i += GRID_SIZE) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }

            drawFood();
            drawSnake();
        }

        // --- Yilani Ciz ---
        function drawSnake() {
            for (let i = 0; i < snake.length; i++) {
                const isHead = (i === 0);
                const part = snake[i];
                const x = part.x * GRID_SIZE;
                const y = part.y * GRID_SIZE;

                // Cyberpunk Neon Glow
                ctx.shadowBlur = isHead ? 25 : 10;
                ctx.shadowColor = '#00ff00';
                
                // Renklendirme
                ctx.fillStyle = isHead ? '#afffa0' : '#00ff00';
                
                // Govdeleri %10 daha kucuk cizelim aradaki bosluklar detay katsin
                const gap = 2;
                ctx.fillRect(x + gap, y + gap, GRID_SIZE - (gap*2), GRID_SIZE - (gap*2));

                // Basa minik detay ekleme
                if (isHead) {
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#fff';
                    // Gidis yonune gore goz ekleme
                    const eyeSize = 4;
                    let ex1 = x + GRID_SIZE/2; let ey1 = y + GRID_SIZE/2;
                    let ex2 = ex1; let ey2 = ey1;
                    
                    if (velocity.x === 1) { ex1+=2; ey1-=6; ex2+=2; ey2+=2; } // Sag
                    else if (velocity.x === -1) { ex1-=6; ey1-=6; ex2-=6; ey2+=2; } // Sol
                    else if (velocity.y === 1) { ex1-=6; ey1+=2; ex2+=2; ey2+=2; } // Asagi
                    else if (velocity.y === -1) { ex1-=6; ey1-=6; ex2+=2; ey2-=6; } // Yukari

                    ctx.fillRect(ex1, ey1, eyeSize, eyeSize);
                    ctx.fillRect(ex2, ey2, eyeSize, eyeSize);
                }
            }
            ctx.shadowBlur = 0; // Sifirlama
        }

        // --- Yemi Ciz (Pulsing) ---
        function drawFood() {
            const x = food.x * GRID_SIZE;
            const y = food.y * GRID_SIZE;

            // Animasyonlu Glow hesaplama
            const pulse = (Math.sin(foodGlowPhase) + 1) / 2; // 0 ile 1 arasi
            const blurSize = 10 + (pulse * 20); 
            
            // Renk gecisli isik secimi (Pembe ve Elektrik Mavisi)
            const colorPhase = Math.sin(foodGlowPhase * 0.5) > 0 ? '#ff00ff' : '#00ffff';

            ctx.shadowBlur = blurSize;
            ctx.shadowColor = colorPhase;
            ctx.fillStyle = colorPhase;

            const gap = 4;
            ctx.fillRect(x + gap, y + gap, GRID_SIZE - (gap*2), GRID_SIZE - (gap*2));
            
            // Icteki akor beyaz merkez
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(x + gap + 4, y + gap + 4, GRID_SIZE - (gap*2) - 8, GRID_SIZE - (gap*2) - 8);
        }

        // --- Yemi Haritaya Ekle ---
        function placeFood() {
            let valid = false;
            while (!valid) {
                food.x = Math.floor(Math.random() * TILE_COUNT);
                food.y = Math.floor(Math.random() * TILE_COUNT);
                
                valid = true;
                // Yilanin ustune gelmemeli
                for (let part of snake) {
                    if (part.x === food.x && part.y === food.y) {
                        valid = false;
                        break;
                    }
                }
            }
        }

        // --- Skor Guncelleme ---
        function updateScoreUI() {
            scoreEl.textContent = score;
            
            // Animasyon kucuk dokunusu
            scoreEl.classList.remove('score-bump');
            void scoreEl.offsetWidth; // Trigger reflow
            scoreEl.classList.add('score-bump');
            setTimeout(() => scoreEl.classList.remove('score-bump'), 150);
        }

        // --- Oyun Bitti Mantigi ---
        function triggerGameOver() {
            gameActive = false;
            
            // Efektleri calistir
            gameWrapper.classList.add('shake');
            gameWrapper.classList.add('glitch-effect');

            // High Score Kaydi LocalStorage
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('cp_snake_highscore', highScore);
                highScoreEl.textContent = highScore;
            }

            // Kisa bir gecikmeyle arayuzu goster ki efekt izlensin
            setTimeout(() => {
                gameOverScreen.classList.add('active');
            }, 400);
        }

        // --- Klavye Kontrolleri ---
        window.addEventListener('keydown', e => {
            // Yilana yon ver (Kendi yonunun tersine gidilemez)
            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (velocity.y !== 1) nextVelocity = { x: 0, y: -1 };
                    e.preventDefault(); // Sayfanin kaymasini onle
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (velocity.y !== -1) nextVelocity = { x: 0, y: 1 };
                    e.preventDefault();
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (velocity.x !== 1) nextVelocity = { x: -1, y: 0 };
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (velocity.x !== -1) nextVelocity = { x: 1, y: 0 };
                    e.preventDefault();
                    break;
            }
        });

        // --- Buton Etkilesimleri ---
        restartBtn.addEventListener('click', () => {
            initGame();
        });

        // Ekleme: Bosluga basarak yeniden baslatma destegi
        window.addEventListener('keydown', e => {
            if (e.code === 'Space' && !gameActive) {
                initGame();
                e.preventDefault();
            }
        });

    </script>
</body>
</html>
